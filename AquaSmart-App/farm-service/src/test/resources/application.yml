spring:
  application:
    name: farm-service

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true

server:
  port: 0
  servlet:
    context-path: /api/farms

eureka:
  client:
    enabled: false

logging:
  level:
    com.aquasmart.farmservice: DEBUG
    org.springframework.web: DEBUG
