server:
  port: 8086

spring:
  application:
    name: irrigation-service
  datasource:
    url: jdbc:mysql://localhost:3306/aquasmart_irrigation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Irrigation configuration
irrigation:
  defaults:
    min-soil-moisture: 30.0
    max-soil-moisture: 70.0
    optimal-irrigation-hours:
      - 6
      - 7
      - 19
      - 20
    rain-threshold-mm: 5.0
    wind-threshold-kmh: 25.0
    temp-threshold-max: 35.0

ai:
  gemini:
    enabled: ${GEMINI_ENABLED:false}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:8}

logging:
  level:
    com.aquasmart.irrigationservice: DEBUG
    org.springframework.web: INFO
