server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**, /api/auth/**
        
        - id: farm-service
          uri: lb://FARM-SERVICE
          predicates:
            - Path=/api/farms, /api/farms/**
          filters:
            - RewritePath=/api/farms/?(?<segment>.*), /api/farms/$\{segment}
        
        - id: farm-parcels-service
          uri: lb://FARM-SERVICE
          predicates:
            - Path=/api/parcels/**, /api/crops/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/farms/$\{segment}
        
        - id: weather-service
          uri: lb://WEATHER-SERVICE
          predicates:
            - Path=/api/weather, /api/weather/**
          filters:
            - RewritePath=/api/weather/?(?<segment>.*), /api/weather/$\{segment}
        
        - id: irrigation-service
          uri: lb://IRRIGATION-SERVICE
          predicates:
            - Path=/api/irrigation, /api/irrigation/**
          filters:
            - RewritePath=/api/irrigation/?(?<segment>.*), /api/irrigation/$\{segment}
        
        - id: alert-service
          uri: lb://ALERT-SERVICE
          predicates:
            - Path=/api/alerts, /api/alerts/**
          filters:
            - RewritePath=/api/alerts/?(?<segment>.*), /api/alerts/$\{segment}
            
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true
